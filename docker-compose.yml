services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: seer_ai_pp
      POSTGRES_USER: seer
      POSTGRES_PASSWORD: seer
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seer -d seer_ai_pp"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - backend/.env.example
    environment:
      DATABASE_URL: postgresql+psycopg://seer:seer@db:5432/seer_ai_pp
      PYTHONPATH: /app/backend:/app
    ports:
      - "8000:8000"
    volumes:
      - .:/app

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: dev
    depends_on:
      - backend
    env_file:
      - frontend/.env.example
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  postgres_data:
  frontend_node_modules:
