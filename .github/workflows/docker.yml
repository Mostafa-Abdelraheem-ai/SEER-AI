name: docker-build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare production env templates
        run: |
          cp backend/.env.production.example backend/.env.production
          cp frontend/.env.production.example frontend/.env.production
      - name: Validate development compose file
        run: docker compose -f docker-compose.yml config
      - name: Validate production compose file
        run: docker compose -f docker-compose.prod.yml config
      - name: Build backend image
        run: docker build -f backend/Dockerfile -t seer-backend .
      - name: Build frontend image
        run: docker build -f frontend/Dockerfile -t seer-frontend .
