name: docker-build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -f backend/Dockerfile -t seer-backend .
      - name: Build frontend image
        run: docker build -f frontend/Dockerfile -t seer-frontend .
